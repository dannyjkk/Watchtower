    data:
      message: "\U0001F3E0 *House tasks check-in.*\n\nDid you finish your house tasks
        today?\n\n_(+1 at tonight's eval if done. No penalty either way.)_"
      reply_markup: '{"inline_keyboard": [[{"text": "✅ Tasks Done", "callback_data":
        "tasks_done"}, {"text": "❌ Tasks Not Done", "callback_data": "tasks_not_done"}]]}'
  mode: single
- id: '1779004812835'
  alias: Power - Sweep Lights Off On Blip Detected
  description: When input_boolean.power_cut_active flips off->on, immediately turn
    off all 7 watched lights to catch any that came back ON before HA detected the
    router blip (Wiz bulbs default to ON at AC restore, often beating router-ping
    detection by several seconds). Uses continue_on_error so failures on still-unreachable
    lights are ignored - those get caught later by Power - Lights Off During Instability
    when they come back online, or by Power - Stable at the end of the event.
  triggers:
  - entity_id: input_boolean.power_cut_active
    from: 'off'
    platform: state
    to: 'on'
  actions:
  - action: light.turn_off
    continue_on_error: true
    target:
      entity_id:
      - light.wiz_foyer
      - light.wiz_keychain
      - light.wiz_tv
      - light.wiz_pc_frontlight
      - light.wiz_pc_backlight
      - light.bedside_lamp_2
      - light.master_bedroom_light
  mode: single
