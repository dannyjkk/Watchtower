- id: '1777701023415'
  alias: Jarvis - House Tasks Prompt
  description: Fires at 22:30 IST. Sends Telegram message with inline buttons for
    house tasks confirmation. Button callback routed by OpenClaw to script.mark_tasks_done.
    Skips if exemption, holiday, or already done.
  triggers:
  - at: '22:30:00'
    platform: time
