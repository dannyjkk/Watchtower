- id: '1773675695966'
  alias: Study lights on when PC is on near sunset or rain
  description: Lights turn on based on sun elevation (getting dark) or rain, but ONLY
    if PC is on. Cool white 6500K.
  triggers:
  - entity_id: binary_sensor.main_pc
    from: 'off'
    to: 'on'
    id: pc_on
    platform: state
  - entity_id: sun.sun
    attribute: elevation
    below: 10
    id: getting_dark
    platform: numeric_state
  - entity_id: weather.forecast_home
    to:
    - rainy
    - pouring
    - lightning
    - lightning-rainy
    id: rain_started
    platform: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: pc_on
      - condition: numeric_state
        entity_id: sun.sun
        attribute: elevation
        below: 10
      - condition: time
        after: '12:00:00'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.wiz_pc_backlight
          - light.wiz_pc_frontlight
        data:
          color_temp_kelvin: 6500
    - conditions:
      - condition: trigger
        id: getting_dark
      - condition: state
        entity_id: binary_sensor.main_pc
        state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.wiz_pc_backlight
          - light.wiz_pc_frontlight
        data:
          color_temp_kelvin: 6500
    - conditions:
      - condition: trigger
        id: rain_started
      - condition: state
        entity_id: binary_sensor.main_pc
        state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.wiz_pc_backlight
          - light.wiz_pc_frontlight
        data:
          color_temp_kelvin: 6500
  mode: single
- id: '1773675719487'
  alias: Study lights off when PC turns off after sunset
