- id: '1777315383099'
  alias: Maria - Phone on Silent Alert
  description: Notifies Danny via mobile_app when Maria's S23 ringer volume drops
    below 13.
  triggers:
  - below: 13
    entity_id:
    - sensor.maria_s_s23_volume_level_ringer
    platform: numeric_state
  actions:
  - device_id: ee7eca85116d9837425592c4c4440b85
    domain: mobile_app
    message: Maria's phone is silent. Fight with her
    type: notify
  mode: single
- id: '1777442444106'
  alias: Power - Ping Force Update
  description: Polls C80 router ping sensor every 3s for fast power-cut detection.
    The native ping integration polls every 30s by default which is too slow to catch
    brief power blips. (The Levoit purifier was previously polled here too but its
    WiFi flakes both ways and was dropped from the detection logic in power_blip_logged
    — see that automation. Polling it here served no purpose, so it was removed.)
  triggers:
  - platform: time_pattern
    seconds: /3
  actions:
  - action: homeassistant.update_entity
    target:
      entity_id:
      - binary_sensor.archer_c80_2nd_router
  mode: single
  max_exceeded: silent
  trace:
    stored_traces: 1
- id: '1777442462377'
  alias: Power - Blip Logged
  description: 'Fires when router ping goes off (router is the only reliable power-state
    signal — purifier WiFi flakes both ways and was dropped from detection). Increments
    blip counter. On the first blip in an event (power_cut_active was off), transitions
    to UNSTABLE: sets the flag, logs start time, sends notification. Light suppression
    during the unstable period is handled by Power - Lights Off During Instability
    (which catches each WiZ default-on after the cycle) — no need to call turn_off
    here, since lights are unreachable mid-cut anyway and that call always errored
    with WizLightConnectionError.'
  triggers:
  - platform: state
    entity_id: binary_sensor.archer_c80_2nd_router
    to: 'off'
  actions:
  - action: counter.increment
    target:
      entity_id: counter.power_blips_current_event
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.power_cut_active
        state: 'off'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.power_cut_active
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.power_cut_start
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - action: notify.mobile_app_danny_s23
        data:
          title: Power Unstable
          message: Detected at {{ now().strftime('%I:%M %p') }}. Lights paused until
            stable.
      - action: persistent_notification.create
        data:
          title: Power Unstable
          message: Power unstable since {{ now().strftime('%d %b, %I:%M %p') }}
          notification_id: power_cut_active
  max: 50
  mode: queued
- id: '1777442483751'
  alias: Power - Stable
  description: 'Fires when router ping has been on for 30s after instability. (Purifier
    dropped from logic — see Power - Blip Logged.) Logs event to rolling history,
    resets per-event counter, restores light state from input_text.light_state_backup
    (persistent across HA restarts), sends summary notification. Restore parses JSON
    snapshot and iterates over 7 watched lights: lights in snapshot get turn_on with
    brightness + kelvin (or brightness only if kelvin=0); lights absent from snapshot
    get turn_off.'
  triggers:
  - entity_id: binary_sensor.archer_c80_2nd_router
    for: 00:00:30
    platform: state
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.power_cut_active
    state: 'on'
  - condition: state
    entity_id: binary_sensor.archer_c80_2nd_router
    state: 'on'
  - condition: template
    value_template: '{{ (now() - states.binary_sensor.archer_c80_2nd_router.last_changed).total_seconds()
      >= 30 }}'
  actions:
  - variables:
      blip_count: '{{ states(''counter.power_blips_current_event'') | int }}'
      start_ts: '{{ state_attr(''input_datetime.power_cut_start'', ''timestamp'')
        | int }}'
  - variables:
      duration_seconds: '{{ (now().timestamp() - start_ts) | int }}'
  - variables:
      duration_pretty: '{{ (duration_seconds // 60) }}m {{ (duration_seconds % 60)
        }}s'
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.power_cut_active
  - action: input_datetime.set_datetime
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    target:
      entity_id: input_datetime.power_cut_end
  - action: input_text.set_value
    data:
      value: '{% set new_entry = now().strftime(''%d%b %H:%M'') ~ '' '' ~ duration_pretty
        ~ '' ('' ~ blip_count ~ ''b)'' %}{% set existing = states(''input_text.power_cut_log'')
        %}{% set combined = (new_entry ~ '' | '' ~ existing) if existing and existing
        not in [''unknown'', ''unavailable'', ''''] else new_entry %}{{ combined[:255]
        }}'
    target:
      entity_id: input_text.power_cut_log
  - action: counter.reset
    target:
      entity_id: counter.power_blips_current_event
  - action: persistent_notification.dismiss
    data:
      notification_id: power_cut_active
  - action: notify.mobile_app_danny_s23
    data:
      message: Stable at {{ now().strftime('%I:%M %p') }}. Was unstable for {{ duration_pretty
        }} ({{ blip_count }} blip{{ 's' if blip_count|int != 1 else '' }}). Restoring
        lights.
      title: Power Stable
  - delay:
      seconds: 2
  - variables:
      snapshot: '{{ (states(''input_text.light_state_backup'') | from_json) if states(''input_text.light_state_backup'')
        not in [''unknown'', ''unavailable'', ''''] else {} }}'
      watched_lights:
      - light.wiz_foyer
      - light.wiz_keychain
      - light.wiz_tv
      - light.wiz_pc_frontlight
      - light.wiz_pc_backlight
      - light.bedside_lamp_2
      - light.master_bedroom_light
  - repeat:
      for_each: '{{ watched_lights }}'
      sequence:
      - variables:
          short_name: '{{ repeat.item.split(''.'')[1] }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ short_name in snapshot and snapshot[short_name][1]
              | int > 0 }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: '{{ repeat.item }}'
            data:
              brightness: '{{ snapshot[short_name][0] | int }}'
              color_temp_kelvin: '{{ snapshot[short_name][1] | int }}'
            continue_on_error: true
        - conditions:
          - condition: template
            value_template: '{{ short_name in snapshot }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: '{{ repeat.item }}'
            data:
              brightness: '{{ snapshot[short_name][0] | int }}'
            continue_on_error: true
        default:
        - action: light.turn_off
          target:
            entity_id: '{{ repeat.item }}'
          continue_on_error: true
  max_exceeded: silent
  mode: single
- id: '1777442566441'
  alias: Power - Lights Off During Instability
  description: Catches WiZ default-on behavior after power cycles. If a watched light
    flips on while power is unstable, immediately turn it back off so the room isn't
    lit during cycling.
  triggers:
  - entity_id:
    - light.wiz_foyer
    - light.wiz_keychain
    - light.wiz_tv
    - light.wiz_pc_frontlight
    - light.wiz_pc_backlight
    - light.bedside_lamp_2
    - light.master_bedroom_light
    platform: state
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.power_cut_active
    state: 'on'
  actions:
  - action: light.turn_off
    target:
      entity_id: '{{ trigger.entity_id }}'
  max: 20
  mode: parallel
- id: '1777442590573'
  alias: Power - Save Light States
  description: Persists current state of all 7 watched lights to input_text.light_state_backup
    as JSON whenever any of them changes state. JSON contains only lights that are
    on, mapped to [brightness, color_temp_kelvin]. Survives HA restart unlike the
    previous scene.create approach. Fires immediately (no debounce) to avoid stale-snapshot
    race during rapid power cycling. Gated on power_cut_active=off so saves are skipped
    during instability. Mode:parallel so simultaneous light changes do not cancel
    each other.
  triggers:
  - entity_id:
    - light.wiz_foyer
    - light.wiz_keychain
    - light.wiz_tv
    - light.wiz_pc_frontlight
    - light.wiz_pc_backlight
    - light.bedside_lamp_2
    - light.master_bedroom_light
    platform: state
  conditions:
  - condition: state
    entity_id: input_boolean.power_cut_active
    state: 'off'
  actions:
  - action: input_text.set_value
    target:
      entity_id: input_text.light_state_backup
    data:
      value: '{% set entries = [] %}{% set lights = [''light.wiz_foyer'', ''light.wiz_keychain'',
        ''light.wiz_tv'', ''light.wiz_pc_frontlight'', ''light.wiz_pc_backlight'',
        ''light.bedside_lamp_2'', ''light.master_bedroom_light''] %}{% for l in lights
        if is_state(l, ''on'') %}{% set _ = entries.append([l.split(''.'')[1], [state_attr(l,
        ''brightness'') or 0, state_attr(l, ''color_temp_kelvin'') or 0]]) %}{% endfor
        %}{{ dict(entries) | tojson }}'
  mode: parallel
  max: 10
- id: '1777442606049'
  alias: Power - Weekly Report
  description: Sends weekly Telegram summary every Sunday 21:00 IST listing recent
    power-cut events from the rolling input_text log. Each event shows date, time,
    duration, and blip count.
  triggers:
  - at: '21:00:00'
    platform: time
  conditions:
  - condition: time
    weekday:
    - sun
  actions:
  - action: rest_command.jarvis_send_message
    data:
      message: "\U0001F4CA *Weekly Power Cut Report* ({{ now().strftime('%d %b %Y')
        }})\n\n*Last 7 days:* {{ states('sensor.power_cuts_this_week') | int }} event{{
        's' if states('sensor.power_cuts_this_week') | int != 1 else '' }}, {% set
        mins = (states('sensor.power_cut_minutes_this_week') | float * 60) | round(1)
        %}{% if mins >= 60 %}{{ (mins / 60) | round(2) }}h{% else %}{{ mins }}m{%
        endif %} unstable\n\n*Recent events* (newest first — date HH:MM, duration,
        blips):\n{{ states('input_text.power_cut_log') if states('input_text.power_cut_log')
        and states('input_text.power_cut_log') not in ['unknown', 'unavailable', '']
        else '_No events logged yet._' }}"
  mode: single
- id: '1777480771420'
  alias: Main Living room lights when i turn off PC to go to sleep
  description: ''
  triggers:
  - entity_id: binary_sensor.main_pc
