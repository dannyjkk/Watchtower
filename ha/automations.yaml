  mode: single
- id: '1776107153923'
  alias: Jarvis - Nightly Report 11:20 PM
  description: Thin trigger at 23:20 IST. Snapshots pre-eval points, calls jarvis_compute_daily_eval,
    applies overflow + exemption math, writes new state, records daily results to
    input_number helpers and Habit Log calendar, sends Telegram report.
  triggers:
  - at: '23:20:00'
    platform: time
  actions:
  - action: input_number.set_value
    data:
      value: '{{ states(''input_number.demerit_points'') | int(0) }}'
    target:
      entity_id: input_number.pre_eval_points
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.exemption_today
        state: 'on'
      sequence:
      - action: script.jarvis_compute_daily_eval
        response_variable: r
      - action: input_number.set_value
        data:
          value: '{{ r.gym_delta | int }}'
        target:
          entity_id: input_number.daily_gym_result
      - action: input_number.set_value
        data:
          value: '{{ r.guitar_delta | int }}'
        target:
          entity_id: input_number.daily_guitar_result
      - action: input_number.set_value
        data:
          value: '{{ r.screen_delta | int }}'
        target:
          entity_id: input_number.daily_screen_result
      - action: input_number.set_value
        data:
          value: '{{ r.tasks_delta | int }}'
        target:
          entity_id: input_number.daily_tasks_result
      - action: input_number.set_value
        data:
          value: '{{ r.total_delta | int }}'
        target:
          entity_id: input_number.daily_total_delta
      - action: input_number.set_value
        data:
          value: '{{ r.steps_delta | int }}'
        target:
          entity_id: input_number.daily_steps_result
      - action: calendar.create_event
        target:
          entity_id: calendar.habit_log
        data:
          summary: Exemption Day
          start_date: '{{ now().strftime(''%Y-%m-%d'') }}'
          end_date: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d'') }}'
          description: 'Exemption day - no eval


            Gym: {{ ''done'' if r.gym_done else ''not done'' }}

            Guitar: {{ r.guitar_min }}/{{ r.guitar_target }} min

            Screen: {{ r.screen_total }}/{{ r.screen_limit }} min

            Steps: {{ r.steps_count }}/{{ r.steps_target }}

            Tasks: {{ ''done'' if r.tasks_done else ''not done'' }}


            YT {{ r.breakdown.youtube }} | IG {{ r.breakdown.instagram }} | NF {{
            r.breakdown.netflix }} | Prime {{ r.breakdown.prime }} | Hotstar {{ r.breakdown.jiohotstar
            }} | Brave {{ r.breakdown.brave }}


            Points: {{ r.current_pts }}/{{ states(''input_number.jarvis_points_max'')
            | int }} (unchanged)

            Exemption days: {{ states(''input_number.exemption_days'') | int }}'
      - action: rest_command.jarvis_send_message
        data:
          message: "\U0001F6CB *Exemption day — no eval tonight.*\n\nYour day at a
            glance (no points changed):\n\n*Habits:*\nGym: {{ 'done' if r.gym_done
            else 'not done' }}\nGuitar: {{ r.guitar_min }}/{{ r.guitar_target }} min
            ({{ ((r.guitar_min | int / r.guitar_target | int) * 100) | round(0) |
            int }}%)\nScreen: {{ r.screen_total }}/{{ r.screen_limit }} min ({{ ((r.screen_total
            | int / r.screen_limit | int) * 100) | round(0) | int }}% of limit){%
            if r.is_relaxed_day %} _(relaxed)_{% endif %}\nSteps: {{ r.steps_count
            }}/{{ r.steps_target }} ({{ ((r.steps_count | int / r.steps_target | int)
            * 100) | round(0) | int }}%)\nHouse tasks: {{ 'done' if r.tasks_done else
            'not done' }}\n\n*Breakdown:*\nYT: {{ r.breakdown.youtube }} | IG: {{
            r.breakdown.instagram }} | NF: {{ r.breakdown.netflix }}\nPrime: {{ r.breakdown.prime
            }} | Hotstar: {{ r.breakdown.jiohotstar }} | Brave: {{ r.breakdown.brave
            }}\n\nPoints: {{ r.current_pts }}/{{ states('input_number.jarvis_points_max')
            | int }} (unchanged) • Exemption days left: {{ states('input_number.exemption_days')
            | int }}"
      - stop: Exemption day — no evaluation
  - action: script.jarvis_compute_daily_eval
    response_variable: r
  - variables:
      current_exempt: '{{ states(''input_number.exemption_days'') | int(0) }}'
      current_overflow: '{{ states(''input_number.overflow_points'') | int(0) }}'
      points_max: '{{ states(''input_number.jarvis_points_max'') | int(12) }}'
      points_per_exemption: '{{ states(''input_number.jarvis_points_per_exemption'')
        | int(6) }}'
  - variables:
      earned_overflow: '{{ (r.would_be_pts - points_max) if r.would_be_pts > points_max
        else 0 }}'
      new_pts: '{{ [0, [points_max, r.would_be_pts] | min] | max }}'
  - variables:
      total_overflow: '{{ current_overflow + earned_overflow }}'
  - variables:
      exemptions_earned: '{{ (total_overflow / points_per_exemption) | int }}'
      new_overflow: '{{ total_overflow % points_per_exemption }}'
  - variables:
      new_exemption_days: '{{ current_exempt + exemptions_earned }}'
  - action: input_number.set_value
    data:
      value: '{{ new_pts }}'
    target:
      entity_id: input_number.demerit_points
  - action: input_number.set_value
    data:
      value: '{{ new_overflow }}'
    target:
      entity_id: input_number.overflow_points
  - action: input_number.set_value
    data:
      value: '{{ new_exemption_days }}'
    target:
      entity_id: input_number.exemption_days
  - action: input_number.set_value
    data:
      value: '{{ r.gym_delta | int }}'
    target:
      entity_id: input_number.daily_gym_result
  - action: input_number.set_value
    data:
      value: '{{ r.guitar_delta | int }}'
    target:
      entity_id: input_number.daily_guitar_result
  - action: input_number.set_value
    data:
      value: '{{ r.screen_delta | int }}'
    target:
      entity_id: input_number.daily_screen_result
  - action: input_number.set_value
    data:
      value: '{{ r.tasks_delta | int }}'
    target:
      entity_id: input_number.daily_tasks_result
  - action: input_number.set_value
    data:
      value: '{{ r.steps_delta | int }}'
    target:
      entity_id: input_number.daily_steps_result
  - action: input_number.set_value
    data:
      value: '{{ r.total_delta | int }}'
    target:
      entity_id: input_number.daily_total_delta
  - action: calendar.create_event
    target:
      entity_id: calendar.habit_log
    data:
      summary: Habits ({{ '+' if r.total_delta | int >= 0 else '' }}{{ r.total_delta
        }})
      start_date: '{{ now().strftime(''%Y-%m-%d'') }}'
      end_date: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d'') }}'
      description: 'Gym: {{ ''+1'' if r.gym_done else ''-2'' }}

        Guitar: {{ r.guitar_min }} min ({{ ''+1'' if r.guitar_done else ''-1'' }})

        Screen: {{ r.screen_total }}/{{ r.screen_limit }} min ({{ ''+1'' if r.screen_ok
        else ''-2'' }})

        Tasks: {{ ''+1'' if r.tasks_done else ''+0'' }}

        Steps: {{ r.steps_count }}/{{ r.steps_target }} ({{ ''+2'' if r.steps_done
        else ''+0'' }})


        YT {{ r.breakdown.youtube }} | IG {{ r.breakdown.instagram }} | NF {{ r.breakdown.netflix
        }} | Prime {{ r.breakdown.prime }} | Hotstar {{ r.breakdown.jiohotstar }}
        | Brave {{ r.breakdown.brave }}


        Points: {{ r.current_pts }} > {{ new_pts }}/{{ points_max }} ({{ ''+'' if
        r.total_delta | int >= 0 else '''' }}{{ r.total_delta }})

        Overflow: {{ new_overflow }}/{{ points_per_exemption }}

        Exemption days: {{ new_exemption_days }}

        Zone: {{ states(''sensor.demerit_zone'') }}'
  - action: rest_command.jarvis_send_message
    data:
      message: "\U0001F4CB *Jarvis Daily Report*{% if r.is_relaxed_day %} \U0001F334{%
        endif %}\n\n*Habits:*\n{{ '✅' if r.gym_done else '❌' }} Gym: {{ '+1' if r.gym_done
        else '-2' }}\n{{ '✅' if r.guitar_done else '❌' }} Guitar ({{ r.guitar_min
        }} min): {{ '+1' if r.guitar_done else '-1' }}\n{{ '✅' if r.screen_ok else
        '❌' }} Screen {{ r.screen_total }}/{{ r.screen_limit }} min: {{ '+1' if r.screen_ok
        else '-2' }}\n{{ '✅' if r.tasks_done else '❌' }} House tasks: {{ '+1' if r.tasks_done
        else '+0' }}\n{{ '✅' if r.steps_done else '⬜' }} Steps {{ r.steps_count }}/{{
        r.steps_target }}: {{ '+2' if r.steps_done else '+0' }}\n\n*Breakdown:*\nYT:
        {{ r.breakdown.youtube }} | IG: {{ r.breakdown.instagram }} | NF: {{ r.breakdown.netflix
        }}\nPrime: {{ r.breakdown.prime }} | Hotstar: {{ r.breakdown.jiohotstar }}
        | Brave: {{ r.breakdown.brave }}\n\n*Points: {{ r.current_pts }} → {{ new_pts
        }}/{{ points_max }}* ({{ '+' if r.total_delta >= 0 else '' }}{{ r.total_delta
        }})\n{% if exemptions_earned > 0 %}\U0001F389 *Earned {{ exemptions_earned
        }} exemption day{{ 's' if exemptions_earned != 1 else '' }}!*\n{% endif %}•
        Overflow: {{ new_overflow }}/{{ points_per_exemption }} toward next exemption\n•
        Exemption days: {{ new_exemption_days }}\n\n⏰ Phone bedtime: 11:30 PM"
  mode: single
- id: '1776107163003'
  alias: Jarvis - Late Phone Demerit
  description: At 11:35 PM checks if phone was used late and applies -1 demerit. Skips
    on exemption days.
  triggers:
  - at: '23:35:00'
    platform: time
  actions:
  - condition: state
    entity_id: input_boolean.phone_used_late
    state: 'on'
  - condition: state
    entity_id: input_boolean.exemption_today
    state: 'off'
  - variables:
      current_pts: '{{ states(''input_number.demerit_points'') | int(0) }}'
      new_pts: '{{ [0, states(''input_number.demerit_points'') | int(0) - 1] | max
        }}'
  - data:
      value: '{{ new_pts }}'
    target:
      entity_id: input_number.demerit_points
    action: input_number.set_value
  - data:
      message: "\U0001F319 Late phone use detected.\nPoints: {{ current_pts }} → {{
        new_pts }} (-1)"
    action: rest_command.jarvis_send_message
  mode: single
- id: '1776107183041'
  alias: Jarvis - Punishment Enforcer
  description: 'Triggers on either sensor.demerit_zone state change OR input_boolean.exemption_today
    state change. Both edges of the exemption boundary are first-class events: declare
    exemption → empty rule set pushed (blocks lifted); midnight reset clears exemption
    → rules re-pushed for actual zone. The sync script reads both inputs itself and
    applies the override — single source of truth lives in script.jarvis_sync_adguard_rules.'
  triggers:
  - entity_id: sensor.demerit_zone
    platform: state
  - entity_id: input_boolean.exemption_today
    platform: state
  actions:
  - action: script.jarvis_sync_adguard_rules
  mode: single
- id: '1776107191043'
  alias: Jarvis - Midnight Reset
  description: Resets daily trackers. Points, overflow, and exemption_days carry over.
  triggers:
  - at: 00:00:00
    platform: time
  actions:
  - data:
      value: 0
    target:
      entity_id:
      - input_number.phone_youtube_usage
      - input_number.phone_netflix_usage
      - input_number.phone_prime_video_usage
      - input_number.phone_instagram_usage
      - input_number.phone_jiohotstar_usage
      - input_number.phone_guitar_usage
      - input_number.phone_brave_usage
    action: input_number.set_value
  - target:
      entity_id:
      - input_boolean.gym_visited_today
      - input_boolean.phone_used_late
      - input_boolean.exemption_today
      - input_boolean.jarvis_holiday_today
      - input_boolean.tasks_completed_today
    action: input_boolean.turn_off
  - action: input_datetime.set_datetime
    data:
      timestamp: 0
    target:
      entity_id: input_datetime.jarvis_gym_entered_at
  mode: single
- id: '1776187920192'
  alias: Jarvis - Screen Time Warnings
  description: Progressive Telegram warnings at 50%, 75%, 92%, 100% of the active
    screen time limit (sensor.jarvis_screen_limit_today). Limit auto-scales for relaxed
    days (weekends + jarvis_holiday_today). Skipped on exemption days. Template triggers
    fire on edge (false→true), so each level alerts once per day. Mode queued/max:2
    so simultaneous trigger re-evaluations at midnight (when phone_screen_time_total
    resets and jarvis_screen_limit_today may flip) don't drop alerts via failed_single
    rejection.
  triggers:
  - id: halfway
    platform: template
    value_template: '{{ states(''sensor.phone_screen_time_total'') | int(0) >= ((states(''sensor.jarvis_screen_limit_today'')
      | int(120)) * 0.50) | int }}'
  - id: three_quarters
    platform: template
    value_template: '{{ states(''sensor.phone_screen_time_total'') | int(0) >= ((states(''sensor.jarvis_screen_limit_today'')
      | int(120)) * 0.75) | int }}'
  - id: near
    platform: template
    value_template: '{{ states(''sensor.phone_screen_time_total'') | int(0) >= ((states(''sensor.jarvis_screen_limit_today'')
      | int(120)) * 0.92) | int }}'
  - id: limit
    platform: template
    value_template: '{{ states(''sensor.phone_screen_time_total'') | int(0) >= states(''sensor.jarvis_screen_limit_today'')
      | int(120) }}'
  conditions:
  - condition: state
    entity_id: input_boolean.exemption_today
    state: 'off'
  actions:
  - variables:
      limit: '{{ states(''sensor.jarvis_screen_limit_today'') | int(120) }}'
      remaining: '{{ (states(''sensor.jarvis_screen_limit_today'') | int(120)) - (states(''sensor.phone_screen_time_total'')
        | int(0)) }}'
      relaxed: '{{ is_state(''binary_sensor.jarvis_relaxed_day'', ''on'') }}'
      total: '{{ states(''sensor.phone_screen_time_total'') | int(0) }}'
  - choose:
    - conditions:
      - condition: trigger
        id: limit
      sequence:
      - action: rest_command.jarvis_send_message
        data:
          message: "\U0001F534 *{{ limit }} min screen time reached!*{% if relaxed
            %} (relaxed day){% endif %}\nYou've hit the limit. This WILL cost you
            -2 points tonight.\nPut the phone down."
    - conditions:
      - condition: trigger
        id: near
      sequence:
      - action: rest_command.jarvis_send_message
        data:
          message: "\U0001F7E0 *{{ total }} min screen time — close to limit!*{% if
            relaxed %} (relaxed day){% endif %}\n{{ remaining }} min left before {{
            limit }} min."
    - conditions:
      - condition: trigger
        id: three_quarters
      sequence:
      - action: rest_command.jarvis_send_message
        data:
          message: "\U0001F7E1 *{{ total }} min screen time — three quarters used.*{%
            if relaxed %} (relaxed day){% endif %}\n{{ remaining }} min remaining
            before {{ limit }} min limit."
    - conditions:
      - condition: trigger
        id: halfway
      sequence:
      - action: rest_command.jarvis_send_message
        data:
          message: '⚠️ *{{ total }} min screen time — halfway.*{% if relaxed %} (relaxed
            day){% endif %}

            {{ remaining }} min left of {{ limit }} min today. Pace yourself.'
  mode: queued
  max: 2
- id: '1776686125717'
  alias: Jarvis - Phone Usage Stats Bulk Update
  description: 'Webhook-driven. Tasker polls usage stats every ~90s and POSTs a flat
    JSON. For each {key, entity} in app_map, overwrites the matching input_number
    if the key is present in the payload. Adding a new tracked app: add one entry
    to app_map. Also updates jarvis_last_tasker_poll for health monitoring.'
  triggers:
  - local_only: false
    platform: webhook
    webhook_id: <YOUR_BULK_WEBHOOK_ID>
  actions:
  - variables:
      app_map:
      - entity: input_number.phone_youtube_usage
        key: youtube
      - entity: input_number.phone_instagram_usage
        key: instagram
      - entity: input_number.phone_netflix_usage
        key: netflix
      - entity: input_number.phone_prime_video_usage
        key: prime
      - entity: input_number.phone_jiohotstar_usage
        key: hotstar
      - entity: input_number.phone_brave_usage
        key: brave
      - entity: input_number.phone_guitar_usage
        key: guitar
  - repeat:
      for_each: '{{ app_map }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ trigger.json[repeat.item.key] is defined }}'
        then:
        - action: input_number.set_value
          data:
            value: '{{ trigger.json[repeat.item.key] | float(0) | round(0) }}'
          target:
            entity_id: '{{ repeat.item.entity }}'
  - action: input_datetime.set_datetime
    data:
      timestamp: '{{ now().timestamp() }}'
    target:
      entity_id: input_datetime.jarvis_last_tasker_poll
  max: 5
  mode: queued
- id: '1777283948113'
  alias: Jarvis - AdGuard Periodic Sync
  description: Drift correction. Every 15 minutes, re-pushes the current zone's rules
    to AdGuard. Catches drift from AdGuard restarts, manual UI edits, or missed state
    changes.
  triggers:
  - minutes: /15
    platform: time_pattern
  actions:
  - action: script.jarvis_sync_adguard_rules
  mode: single
- id: '1777315026442'
  alias: Jarvis - Health Watchdog
  description: 'Monitors data flow health AND critical automation state. Alerts via
    Telegram when Tasker stops polling (>15 min stale), AdGuard sync fails (>30 min
    stale), or any monitored Jarvis automation is disabled. Re-checks every 30 min.
    Cooldown: 6h between alerts to avoid spam.'
  triggers:
  - platform: time_pattern
    minutes: /30
  conditions:
  - condition: template
    value_template: '{{ (states(''sensor.jarvis_minutes_since_tasker_poll'') | int(0)
      > 15) or (states(''sensor.jarvis_minutes_since_adguard_sync'') | int(0) > 30)
      or ((monitored_automations | select(''is_state'', ''off'') | list) | length
      > 0) }}'
  - condition: template
    value_template: '{{ (as_timestamp(now()) - as_timestamp(states(''input_datetime.jarvis_last_health_alert'')))
      / 3600 >= 6 }}'
  actions:
  - variables:
      tasker_age: '{{ states(''sensor.jarvis_minutes_since_tasker_poll'') | int(0)
        }}'
      adguard_age: '{{ states(''sensor.jarvis_minutes_since_adguard_sync'') | int(0)
        }}'
      tasker_stale: '{{ states(''sensor.jarvis_minutes_since_tasker_poll'') | int(0)
        > 15 }}'
      adguard_stale: '{{ states(''sensor.jarvis_minutes_since_adguard_sync'') | int(0)
        > 30 }}'
      disabled_automations: '{{ monitored_automations | select(''is_state'', ''off'')
        | list }}'
      automations_off: '{{ (monitored_automations | select(''is_state'', ''off'')
        | list) | length > 0 }}'
  - action: rest_command.jarvis_send_message
    data:
      message: "\U0001F6A8 *Jarvis Health Alert*\n\n{% if tasker_stale %}❌ *Tasker
        stale*: {{ tasker_age }} min since last poll (threshold: 15 min)\n  → Open
        Tasker on phone, verify polling profile is enabled\n{% endif %}{% if adguard_stale
        %}❌ *AdGuard sync stale*: {{ adguard_age }} min since last sync (threshold:
        30 min)\n  → Check HA logs, verify AdGuard is reachable at 192.168.0.122\n{%
        endif %}{% if automations_off %}❌ *Automations disabled* ({{ disabled_automations
        | length }}):\n{% for a in disabled_automations %}  • {{ state_attr(a, 'friendly_name')
        or a }}\n{% endfor %}  → Re-enable in HA UI (Settings → Automations) or via
        MCP\n{% endif %}\n_Next check in 30 min. No further alerts for 6h to prevent
        spam._"
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.jarvis_last_health_alert
    data:
      timestamp: '{{ now().timestamp() }}'
  mode: single
  variables:
    monitored_automations:
    - automation.jarvis_phone_usage_stats_bulk_update
    - automation.jarvis_gym_visit_detected
    - automation.jarvis_gym_exit_detected
    - automation.jarvis_late_phone_usage
    - automation.jarvis_screen_time_warnings
    - automation.jarvis_house_tasks_prompt
    - automation.jarvis_nightly_report_10_45_pm
    - automation.jarvis_late_phone_demerit
    - automation.jarvis_punishment_enforcer
    - automation.jarvis_adguard_periodic_sync
    - automation.jarvis_midnight_reset
- id: '1777315082401'
  alias: Jarvis - Gym Exit Detected
  description: Computes gym duration when Danny leaves the gym zone. Reads entry timestamp
    from input_datetime.jarvis_gym_entered_at (set by Jarvis - Gym Entry Detected).
    Marks gym done if duration ≥ jarvis_gym_min_minutes. Always clears the entry timestamp
    on exit. RESTART-SAFE.
  triggers:
  - platform: state
    entity_id: person.danny
    from: Gym
  actions:
  - variables:
      entered_ts: '{{ as_timestamp(states(''input_datetime.jarvis_gym_entered_at''),
        0) }}'
      min_minutes: '{{ states(''input_number.jarvis_gym_min_minutes'') | int(20) }}'
      minutes_at_gym: '{{ ((as_timestamp(now()) - as_timestamp(states(''input_datetime.jarvis_gym_entered_at''),
        0)) / 60) | round(0) }}'
  - condition: template
    value_template: '{{ entered_ts | float(0) > 0 }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ minutes_at_gym | int >= min_minutes | int }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.gym_visited_today
      - action: rest_command.jarvis_send_message
        data:
          message: "\U0001F4AA Gym visit confirmed ({{ minutes_at_gym }} min). +1
            point tonight."
    default:
    - action: rest_command.jarvis_send_message
      data:
        message: "\U0001F3C3 Gym exit detected after only {{ minutes_at_gym }} min
          (need {{ min_minutes }}). No credit."
  - action: input_datetime.set_datetime
    data:
      timestamp: 0
    target:
      entity_id: input_datetime.jarvis_gym_entered_at
  mode: single
- id: '1777315139752'
  alias: NFC - Master Bedroom Vacuum Toggle
  description: Tag-triggered vacuum toggle for the master bedroom. Tap NFC tag to
    start/pause/resume vacuum cleaning the bedroom area.
  triggers:
  - tag_id: 2be8ced4-9917-4ed7-ab0b-bd83e94db971
