- id: '1773760083029'
  alias: Phone battery warning — red study lights at 8PM
  description: After 8PM, if Danny phone below 50% and study lights on, turn red.
    Restore to cool white 6500K when charging or above 50%. Save-of-current-brightness
    is gated on lights NOT already being red, so the 5-min re-evaluation doesn't clobber
    the saved value with red's 255.
  triggers:
  - below: 50
    entity_id: sensor.danny_s23_battery_level
    platform: numeric_state
  - minutes: /5
    platform: time_pattern
  - entity_id: sensor.danny_s23_battery_state
    platform: state
    to: charging
  - above: 50
    entity_id: sensor.danny_s23_battery_level
    platform: numeric_state
  conditions: []
  actions:
  - else:
    - below: 50
      condition: numeric_state
      entity_id: sensor.danny_s23_battery_level
    - after: '20:00:00'
      condition: time
    - condition: state
      entity_id: light.wiz_pc_backlight
      state: 'on'
    - alias: Only save brightness if lights are not already red
      if:
      - condition: template
        value_template: '{% set rgb = state_attr(''light.wiz_pc_backlight'', ''rgb_color'')
          %}{{ rgb is none or (rgb|list) != [255, 0, 0] }}'
      then:
      - action: input_number.set_value
        data:
          value: '{{ state_attr(''light.wiz_pc_backlight'', ''brightness'') | int(255)
            }}'
        target:
          entity_id: input_number.backlight_saved_brightness
      - action: input_number.set_value
        data:
          value: '{{ state_attr(''light.wiz_pc_frontlight'', ''brightness'') | int(255)
            }}'
        target:
          entity_id: input_number.frontlight_saved_brightness
    - action: light.turn_on
      data:
        brightness_pct: 100
        rgb_color:
        - 255
        - 0
        - 0
      target:
        entity_id:
        - light.wiz_pc_backlight
        - light.wiz_pc_frontlight
    if:
    - condition: or
      conditions:
      - condition: state
        entity_id: sensor.danny_s23_battery_state
        state: charging
      - above: 50
        condition: numeric_state
        entity_id: sensor.danny_s23_battery_level
    - condition: state
      entity_id: light.wiz_pc_backlight
      state: 'on'
    - after: sunset
      condition: sun
    then:
    - action: light.turn_on
      data:
        brightness: '{{ states(''input_number.backlight_saved_brightness'') | int(255)
          }}'
        color_temp_kelvin: 6500
      target:
        entity_id:
        - light.wiz_pc_backlight
        - light.wiz_pc_frontlight
  mode: restart
- id: '1775409050188'
  alias: Maria's iPad — Block internet on low battery
  description: Blocks Maria's iPad (192.168.0.41) via AdGuard when her S23 battery
    is below 15% and not charging. Restores when charging starts or battery goes above
    15%.
  triggers:
  - platform: numeric_state
    entity_id: sensor.maria_s_s23_battery_level
    below: 15
    id: battery_low
  - platform: numeric_state
    entity_id: sensor.maria_s_s23_battery_level
    above: 15
    id: battery_ok
  - platform: state
    entity_id: sensor.maria_s_s23_battery_state
    to: charging
    id: charging
  - platform: state
    entity_id: sensor.maria_s_s23_battery_state
    to: discharging
    id: unplugged
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: trigger
            id: battery_low
          - condition: not
            conditions:
            - condition: state
              entity_id: sensor.maria_s_s23_battery_state
              state: charging
        - condition: and
          conditions:
          - condition: trigger
            id: unplugged
          - condition: numeric_state
            entity_id: sensor.maria_s_s23_battery_level
            below: 15
      sequence:
      - action: rest_command.adguard_block_maria_ipad
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: battery_ok
        - condition: trigger
          id: charging
      sequence:
      - action: rest_command.adguard_unblock_maria_ipad
  mode: restart
- id: '1776107118790'
  alias: Jarvis - Gym Entry Detected
  description: 'Records gym entry timestamp when Danny enters the gym zone (and is
    not on home WiFi, ruling out GPS drift). Companion automation ''Jarvis - Gym Exit
    Detected'' computes duration on exit and decides whether to mark gym done. RESTART-SAFE:
    state stored in input_datetime helper, survives HA restarts mid-gym.'
  triggers:
  - platform: state
    entity_id: person.danny
    to: Gym
  actions:
  - condition: template
    value_template: '{{ states(''sensor.danny_s23_wi_fi_connection'') in [''<not connected>'',
      ''unavailable'', ''unknown''] }}'
  - action: input_datetime.set_datetime
    data:
      timestamp: '{{ now().timestamp() }}'
    target:
      entity_id: input_datetime.jarvis_gym_entered_at
  mode: single
- id: '1776107129898'
  alias: Jarvis - Late Phone Usage
  description: Flags late phone use when Tasker reports screen on after 11:30 PM
  triggers:
  - allowed_methods:
    - POST
    local_only: false
    platform: webhook
    webhook_id: <YOUR_LATE_PHONE_WEBHOOK_ID>
  conditions:
  - condition: state
    entity_id: input_boolean.phone_used_late
    state: 'off'
  actions:
  - target:
      entity_id: input_boolean.phone_used_late
